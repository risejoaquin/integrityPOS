<!DOCTYPE html>
<html lang="es" class="bg-gray-950 text-green-500 font-mono">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INTEGRITY POS // TERMINAL 01</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Courier New', Courier, monospace; }
        .btn-industrial {
            border: 2px solid #22c55e;
            background-color: #052e16;
            color: #22c55e;
            text-transform: uppercase;
            font-weight: bold;
            transition: all 0.1s;
        }
        .btn-industrial:hover {
            background-color: #22c55e;
            color: #000;
        }
        .btn-industrial:active {
            transform: scale(0.98);
        }
        .btn-charge {
            border: 2px solid #eab308;
            background-color: #422006;
            color: #eab308;
        }
        .btn-charge:hover {
            background-color: #eab308;
            color: #000;
        }
        .btn-charge:disabled {
            border-color: #374151;
            color: #6b7280;
            background-color: #111827;
            cursor: not-allowed;
        }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden flex flex-col bg-gray-950">
    <!-- HEADER -->
    <header class="border-b-2 border-green-800 p-4 flex justify-between items-center bg-black">
        <div>
            <h1 class="text-2xl font-bold tracking-widest text-green-500">INTEGRITY<span class="text-gray-500">POS</span></h1>
            <div class="text-xs text-green-700 mt-1">SYS.STS: ONLINE | DB.CONN: OK_PGSQL</div>
        </div>
        <div class="text-right">
            <div class="text-2xl text-green-400" id="clock">00:00:00</div>
            <div class="text-xs text-green-700">STATION_01 (CASHIER_A)</div>
        </div>
    </header>

    <!-- MAIN GRID -->
    <main class="flex-1 flex overflow-hidden">
        <!-- LEFT: CATALOG -->
        <section class="w-2/3 border-r-2 border-green-800 p-4 overflow-y-auto">
            <h2 class="text-sm text-green-700 mb-4 border-b border-green-900 pb-2">> SELECT_PRODUCT_</h2>
            <div class="grid grid-cols-3 gap-4" id="catalog">
                <!-- Hardcoded for demo purposes as requested -->
                <button class="btn-industrial p-6 flex flex-col items-center justify-center product-btn" data-id="1" data-name="HEAVY GEAR" data-price="45.50">
                    <span class="text-lg mb-2">HEAVY GEAR</span>
                    <span class="text-sm opacity-80">$45.50</span>
                </button>
                <button class="btn-industrial p-6 flex flex-col items-center justify-center product-btn" data-id="2" data-name="STEEL BOLT" data-price="2.00">
                    <span class="text-lg mb-2">STEEL BOLT</span>
                    <span class="text-sm opacity-80">$2.00</span>
                </button>
                <button class="btn-industrial p-6 flex flex-col items-center justify-center product-btn" data-id="3" data-name="WRENCH 10MM" data-price="12.75">
                    <span class="text-lg mb-2">WRENCH 10MM</span>
                    <span class="text-sm opacity-80">$12.75</span>
                </button>
                <button class="btn-industrial p-6 flex flex-col items-center justify-center product-btn" data-id="4" data-name="HYD FLUID (1L)" data-price="18.00">
                    <span class="text-lg mb-2">HYD FLUID (1L)</span>
                    <span class="text-sm opacity-80">$18.00</span>
                </button>
                <button class="btn-industrial p-6 flex flex-col items-center justify-center product-btn" data-id="5" data-name="INDUSTRIAL TAPE" data-price="8.50">
                    <span class="text-lg mb-2">IND TAPE</span>
                    <span class="text-sm opacity-80">$8.50</span>
                </button>
                <button class="btn-industrial p-6 flex flex-col items-center justify-center product-btn" data-id="6" data-name="SAFETY GLOVES" data-price="15.00">
                    <span class="text-lg mb-2">SAFETY GLOVES</span>
                    <span class="text-sm opacity-80">$15.00</span>
                </button>
            </div>
        </section>

        <!-- RIGHT: TICKET -->
        <section class="w-1/3 p-4 flex flex-col bg-black">
            <h2 class="text-sm text-green-700 mb-4 border-b border-green-900 pb-2">> CURRENT_TICKET_</h2>
            
            <div class="flex-1 border border-green-900 p-2 mb-4 overflow-y-auto" id="ticket-items">
                <!-- Items will be injected here -->
            </div>

            <div class="border-t-2 border-green-800 pt-4">
                <div class="flex justify-between items-center mb-4 text-2xl font-bold text-green-400">
                    <span>> TOTAL:</span>
                    <span id="ticket-total">$0.00</span>
                </div>
                <button id="btn-cobrar" disabled class="btn-industrial w-full text-3xl py-8 tracking-widest btn-charge">
                    COBRAR [F12]
                </button>
            </div>
        </section>
    </main>

    <div id="status-overlay" class="fixed inset-0 bg-black bg-opacity-95 flex items-center justify-center hidden z-50">
        <div class="border-4 border-green-500 p-10 text-center uppercase tracking-widest max-w-lg w-full" id="status-box">
            <h2 class="text-3xl mb-4 font-bold text-green-500" id="status-title">PROCESSING...</h2>
            <p id="status-msg" class="text-xl text-green-700 font-mono"></p>
        </div>
    </div>

    <script>
        // Clock
        setInterval(() => {
            document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-US', { hour12: false });
        }, 1000);

        let ticket = [];
        const ticketContainer = document.getElementById('ticket-items');
        
        function formatMoney(amount) {
            return '$' + amount.toFixed(2);
        }

        function updateTicketView() {
            if (ticket.length === 0) {
                ticketContainer.innerHTML = '<div class="text-green-900 text-center mt-10 text-xl tracking-widest">[ TICKET EMPTY ]</div>';
                document.getElementById('ticket-total').textContent = formatMoney(0);
                document.getElementById('btn-cobrar').disabled = true;
                return;
            }

            document.getElementById('btn-cobrar').disabled = false;
            let total = 0;
            ticketContainer.innerHTML = ticket.map((item, index) => {
                const subtotal = item.quantity * item.price;
                total += subtotal;
                return `
                    <div class="flex justify-between items-center mb-3 text-lg border-b border-green-900 pb-2">
                        <div class="flex-1 truncate pr-2">${item.name}</div>
                        <div class="w-16 text-right">${item.quantity}x</div>
                        <div class="w-24 text-right">${formatMoney(subtotal)}</div>
                        <button class="ml-4 text-red-600 hover:text-red-400 font-bold" onclick="removeItem(${index})">[X]</button>
                    </div>
                `;
            }).join('');
            document.getElementById('ticket-total').textContent = formatMoney(total);
        }

        window.removeItem = function(index) {
            ticket.splice(index, 1);
            updateTicketView();
        }

        document.querySelectorAll('.product-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const id = parseInt(btn.dataset.id, 10);
                const name = btn.dataset.name;
                const price = parseFloat(btn.dataset.price);

                const existingItem = ticket.find(i => i.product_id === id);
                if (existingItem) {
                    existingItem.quantity += 1;
                } else {
                    ticket.push({ product_id: id, name, quantity: 1, price: price });
                }
                updateTicketView();
            });
        });

        function showStatus(title, msg, isError = false) {
            const overlay = document.getElementById('status-overlay');
            const box = document.getElementById('status-box');
            const titleEl = document.getElementById('status-title');
            const msgEl = document.getElementById('status-msg');
            
            titleEl.textContent = title;
            msgEl.textContent = msg;
            
            if (isError) {
                box.classList.replace('border-green-500', 'border-red-600');
                titleEl.classList.replace('text-green-500', 'text-red-600');
                msgEl.classList.replace('text-green-700', 'text-red-700');
            } else {
                box.classList.replace('border-red-600', 'border-green-500');
                titleEl.classList.replace('text-red-600', 'text-green-500');
                msgEl.classList.replace('text-red-700', 'text-green-700');
            }
            
            overlay.classList.remove('hidden');
        }

        function hideStatus() {
            document.getElementById('status-overlay').classList.add('hidden');
        }

        async function processCheckout() {
            if (ticket.length === 0) return;

            // Bloquear botón para evitar doble clic
            document.getElementById('btn-cobrar').disabled = true;

            const payload = ticket.map(item => ({
                product_id: item.product_id,
                quantity: item.quantity,
                unit_price: item.price,
                subtotal: item.quantity * item.price
            }));

            showStatus('TX_INITIATED...', 'Connecting to POS engine (BOM update in progress)');

            try {
                const response = await fetch('/api/checkout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const isJson = response.headers.get("content-type")?.includes("application/json");
                let data = {};
                if (isJson) {
                    data = await response.json();
                } else {
                    data.error = await response.text();
                }

                if (!response.ok) {
                    const errorMsg = data.error || 'SYS_FAILURE: Unrecoverable error';
                    showStatus('TX_FAILED', errorMsg, true);
                    setTimeout(() => {
                        hideStatus();
                        document.getElementById('btn-cobrar').disabled = false;
                    }, 4000);
                } else {
                    showStatus('TX_SUCCESS', 'Transaction committed. HW: Drawer Open Triggered.');
                    ticket = [];
                    updateTicketView();
                    setTimeout(hideStatus, 2500);
                }
            } catch (err) {
                showStatus('NETWORK_ERROR', err.message, true);
                setTimeout(() => {
                    hideStatus();
                    document.getElementById('btn-cobrar').disabled = false;
                }, 4000);
            }
        }

        document.getElementById('btn-cobrar').addEventListener('click', processCheckout);

        document.addEventListener('keydown', (e) => {
            if (document.getElementById('status-overlay').classList.contains('hidden') === false) return;
            
            if (e.key === 'F12') {
                e.preventDefault();
                processCheckout();
            }
        });

        // Initialize state
        updateTicketView();
    </script>
</body>
</html>
